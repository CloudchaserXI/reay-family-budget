<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reay Family Budget</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Reay Family Budget">
  <link rel="apple-touch-icon" href="/icons/icon-180.png">

  <!-- Theme colour (Android chrome bar + Windows taskbar) -->
  <meta name="theme-color" content="#0B1726">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: {
              50: '#EEF2FB',
              100: '#D4DFF5',
              200: '#A9BFEB',
              300: '#7E9FE0',
              400: '#537FD6',
              500: '#2563EB',
              600: '#1D50C0',
              700: '#153C90',
              800: '#1B3A6B',
              900: '#0F2347'
            }
          }
        }
      }
    };
  </script>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4",
      "recharts": "https://esm.sh/recharts@2.12.7"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn 0.3s ease; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="module">
    import React, { useState, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createClient } from '@supabase/supabase-js';
    import { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } from 'recharts';

    const sb = createClient(
      'https://pajlrdnhldmixcxbfqis.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhamxyZG5obGRtaXhjeGJmcWlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzUwOTAsImV4cCI6MjA5MTQxMTA5MH0.1PhX8qrOHhWB426EeoXrXi-WQBvg9f5tjJUoJeO8DmQ'
    );

    const gbp = (n) => `£${(+n || 0).toLocaleString('en-GB', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
    const gbp2 = (n) => `£${Math.abs(+n || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    const pct = (n, d) => d ? `${((n / d) * 100).toFixed(0)}%` : '0%';

    // ── Login ──
    function Login() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        const { error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
        if (err) setError(err.message);
        setLoading(false);
      };

      return React.createElement('div', { className: 'min-h-screen bg-slate-100 flex items-center justify-center px-4' },
        React.createElement('div', { className: 'bg-white rounded-2xl shadow-lg border border-slate-200 p-8 w-full max-w-sm' },
          React.createElement('div', { className: 'flex items-center gap-3 mb-8' },
            React.createElement('div', { className: 'w-12 h-12 bg-navy-800 rounded-xl flex items-center justify-center text-white text-2xl font-bold' }, 'R'),
            React.createElement('div', null,
              React.createElement('p', { className: 'font-bold text-slate-800 text-lg' }, 'Reay Family'),
              React.createElement('p', { className: 'text-slate-400 text-sm' }, 'Budget Tracker')
            )
          ),
          React.createElement('form', { onSubmit: submit, className: 'space-y-4' },
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1' }, 'Email'),
              React.createElement('input', {
                type: 'email',
                value: email,
                onChange: (e) => setEmail(e.target.value),
                required: true,
                placeholder: 'you@example.com',
                className: 'w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-300'
              })
            ),
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1' }, 'Password'),
              React.createElement('input', {
                type: 'password',
                value: password,
                onChange: (e) => setPassword(e.target.value),
                required: true,
                placeholder: '••••••••',
                className: 'w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-navy-300'
              })
            ),
            error && React.createElement('p', { className: 'text-red-500 text-sm bg-red-50 px-3 py-2 rounded-lg' }, error),
            React.createElement('button', {
              type: 'submit',
              disabled: loading,
              className: 'w-full bg-navy-800 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-navy-900 disabled:opacity-50'
            }, loading ? 'Signing in…' : 'Sign in')
          )
        )
      );
    }

    // ── Dashboard ──
    function Dashboard() {
      return React.createElement('div', { className: 'fade-in' },
        React.createElement('h2', { className: 'text-xl font-bold text-slate-800' }, 'Dashboard'),
        React.createElement('p', { className: 'text-slate-400 text-sm mt-2' }, 'Overview of your budget and spending')
      );
    }

    // ── App ──
    function App() {
      const [session, setSession] = useState(null);
      const [authLoading, setAuthLoading] = useState(true);

      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setAuthLoading(false);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setSession(session));
        return () => subscription.unsubscribe();
      }, []);

      if (authLoading) {
        return React.createElement('div', { className: 'min-h-screen flex flex-col items-center justify-center gap-4 bg-slate-100' },
          React.createElement('div', { className: 'w-10 h-10 border-4 border-navy-800 border-t-transparent rounded-full animate-spin' }),
          React.createElement('p', { className: 'text-slate-500 text-sm' }, 'Loading…')
        );
      }

      if (!session) {
        return React.createElement(Login);
      }

      return React.createElement('div', { className: 'min-h-screen flex flex-col bg-slate-100' },
        React.createElement('nav', { className: 'bg-navy-800 text-white shadow-lg' },
          React.createElement('div', { className: 'max-w-6xl mx-auto px-4 py-4' },
            React.createElement('p', { className: 'font-bold' }, '🏡 Reay Family Budget')
          )
        ),
        React.createElement('main', { className: 'flex-1 max-w-6xl w-full mx-auto px-4 py-6' },
          React.createElement(Dashboard)
        ),
        React.createElement('footer', { className: 'text-center text-xs text-slate-400 py-3 border-t border-slate-200 bg-white' },
          '🏡 Reay Family Budget · Built with React + Supabase'
        )
      );
    }

    createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js')
          .then(function (r) { console.log('SW registered:', r.scope); })
          .catch(function (e) { console.log('SW registration failed:', e); });
      });
    }
  </script>
</body>
</html>
