<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reay Family Budget</title>
  <style>
    :root {
      --color-blue-600: #2563eb;
      --color-blue-700: #1d4ed8;
      --color-slate-50: #f8fafc;
      --color-slate-100: #f1f5f9;
      --color-slate-200: #e2e8f0;
      --color-slate-400: #94a3b8;
      --color-slate-500: #64748b;
      --color-slate-600: #475569;
      --color-slate-700: #334155;
      --color-slate-800: #1e293b;
      --color-red-50: #fef2f2;
      --color-red-200: #fecaca;
      --color-red-700: #b91c1c;
      --color-white: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--color-slate-800);
      background-color: var(--color-slate-100);
      min-height: 100vh;
    }
    .min-h-screen { min-height: 100vh; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }
    .gap-4 { gap: 1rem; }
    .gap-6 { gap: 1.5rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .space-y-6 > * + * { margin-top: 1.5rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .py-6 { padding-top: 1.5rem; padding-bottom: 1.5rem; }
    .py-2\.5 { padding-top: 0.625rem; padding-bottom: 0.625rem; }
    .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
    .p-8 { padding: 2rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-8 { margin-bottom: 2rem; }
    .mt-2 { margin-top: 0.5rem; }
    .text-xs { font-size: 0.75rem; }
    .text-sm { font-size: 0.875rem; }
    .text-xl { font-size: 1.25rem; }
    .text-2xl { font-size: 1.5rem; }
    .font-bold { font-weight: bold; }
    .font-semibold { font-weight: 600; }
    .uppercase { text-transform: uppercase; }
    .w-full { width: 100%; }
    .bg-white { background-color: var(--color-white); }
    .bg-slate-100 { background-color: var(--color-slate-100); }
    .bg-slate-800 { background-color: var(--color-slate-800); }
    .bg-red-50 { background-color: var(--color-red-50); }
    .bg-blue-600 { background-color: var(--color-blue-600); }
    .bg-blue-700 { background-color: var(--color-blue-700); }
    .text-slate-400 { color: var(--color-slate-400); }
    .text-slate-500 { color: var(--color-slate-500); }
    .text-slate-600 { color: var(--color-slate-600); }
    .text-slate-700 { color: var(--color-slate-700); }
    .text-slate-800 { color: var(--color-slate-800); }
    .text-white { color: var(--color-white); }
    .text-red-700 { color: var(--color-red-700); }
    .border { border: 1px solid var(--color-slate-200); }
    .border-slate-200 { border-color: var(--color-slate-200); }
    .border-red-200 { border-color: var(--color-red-200); }
    .rounded-xl { border-radius: 0.75rem; }
    .rounded-lg { border-radius: 0.5rem; }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    .hover\:bg-blue-700:hover { background-color: var(--color-blue-700); }
    .disabled\:opacity-50:disabled { opacity: 0.5; }
    input, button { font: inherit; }
    input:focus { outline: 2px solid var(--color-blue-600); outline-offset: 0; }
    button { cursor: pointer; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen">
  <div id="root"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4"
    }
  }
  </script>

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createClient } from '@supabase/supabase-js';

    const sb = createClient(
      'https://pajlrdnhldmixcxbfqis.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBhamxyZG5obGRtaXhjeGJmcWlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzUwOTAsImV4cCI6MjA5MTQxMTA5MH0.1PhX8qrOHhWB426EeoXrXi-WQBvg9f5tjJUoJeO8DmQ'
    );

    function Login() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        try {
          const { error: err } = await sb.auth.signInWithPassword({
            email: email.trim(),
            password
          });
          if (err) setError(err.message);
        } catch (e) {
          setError('Error logging in: ' + e.message);
        }
        setLoading(false);
      };

      return React.createElement('div', { className: 'min-h-screen bg-slate-100 flex items-center justify-center px-4' },
        React.createElement('div', { className: 'bg-white rounded-2xl shadow-lg border border-slate-200 p-8 w-full max-w-sm' },
          React.createElement('h1', { className: 'text-2xl font-bold text-slate-800 mb-8' }, '🏡 Reay Family Budget'),
          React.createElement('form', { onSubmit: handleSubmit, className: 'space-y-4' },
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-xs font-semibold text-slate-500 uppercase mb-1' }, 'Email'),
              React.createElement('input', {
                type: 'email',
                value: email,
                onChange: (e) => setEmail(e.target.value),
                required: true,
                placeholder: 'you@example.com',
                className: 'w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400'
              })
            ),
            React.createElement('div', null,
              React.createElement('label', { className: 'block text-xs font-semibold text-slate-500 uppercase mb-1' }, 'Password'),
              React.createElement('input', {
                type: 'password',
                value: password,
                onChange: (e) => setPassword(e.target.value),
                required: true,
                placeholder: '••••••••',
                className: 'w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400'
              })
            ),
            error && React.createElement('div', { className: 'bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-lg text-sm' }, error),
            React.createElement('button', {
              type: 'submit',
              disabled: loading,
              className: 'w-full bg-blue-600 text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-blue-700 disabled:opacity-50'
            }, loading ? 'Signing in…' : 'Sign in')
          )
        )
      );
    }

    function Dashboard() {
      return React.createElement('div', { className: 'space-y-6' },
        React.createElement('h2', { className: 'text-2xl font-bold text-slate-800' }, 'Dashboard'),
        React.createElement('p', { className: 'text-slate-600' }, 'Welcome to your family budget tracker')
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const init = async () => {
          try {
            const { data: { session } } = await sb.auth.getSession();
            setSession(session);
          } catch (e) {
            console.error('Auth error:', e);
          } finally {
            setLoading(false);
          }
        };
        init();

        const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });

        return () => {
          subscription?.unsubscribe();
        };
      }, []);

      if (loading) {
        return React.createElement('div', { className: 'min-h-screen flex flex-col items-center justify-center bg-slate-100' },
          React.createElement('p', { className: 'text-slate-600' }, 'Loading…')
        );
      }

      if (!session) {
        return React.createElement(Login);
      }

      return React.createElement('div', { className: 'min-h-screen flex flex-col bg-slate-100' },
        React.createElement('nav', { className: 'bg-blue-600 text-white shadow-lg' },
          React.createElement('div', { className: 'max-w-6xl mx-auto px-4 py-4 flex justify-between items-center' },
            React.createElement('h1', { className: 'text-xl font-bold' }, '🏡 Reay Family Budget'),
            React.createElement('button', {
              onClick: () => sb.auth.signOut(),
              className: 'text-white text-sm hover:bg-blue-700 px-3 py-1 rounded'
            }, 'Sign out')
          )
        ),
        React.createElement('main', { className: 'flex-1 max-w-6xl w-full mx-auto px-4 py-6' },
          React.createElement(Dashboard)
        ),
        React.createElement('footer', { className: 'text-center text-xs text-slate-500 py-4 border-t border-slate-200' },
          '🏡 Reay Family Budget'
        )
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>

</body>
</html>
