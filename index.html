function closestWorkingDay25(year,month){
  const d=new Date(year,month,25);
  const dow=d.getDay();
  if(dow===6)d.setDate(24);
  else if(dow===0)d.setDate(26);
  return d;
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({d}){
  const{categories,items,months,actuals,monthBudgets,adhocList}=d;
  const latestMonth=months.length>0?months[months.length-1]:null;
  const getBudget=itemId=>{
    if(latestMonth){const mb=monthBudgets.find(b=>b.month_id===latestMonth.id&&b.item_id===itemId);if(mb)return parseFloat(mb.budget_amount);}
    const it=items.find(i=>i.id===itemId);return it?parseFloat(it.budget_amount):0;
  };
  const incomeCats=categories.filter(c=>c.name==='Income');
  const expenseCats=categories.filter(c=>c.name!=='Income');
  const adhocTotal=adhocList.filter(a=>latestMonth&&a.month_id===latestMonth.id).reduce((s,a)=>s+parseFloat(a.amount),0);
  const totalIncome=items.filter(i=>incomeCats.find(c=>c.id===i.category_id)).reduce((s,i)=>s+getBudget(i.id),0)+adhocTotal;
  const totalExpenses=items.filter(i=>expenseCats.find(c=>c.id===i.category_id)).reduce((s,i)=>s+getBudget(i.id),0);
  const surplus=totalIncome-totalExpenses;
  const pieData=expenseCats.map(cat=>({name:cat.name,value:items.filter(i=>i.category_id===cat.id).reduce((s,i)=>s+getBudget(i.id),0)})).filter(d=>d.value>0);
  const topItems=[...items].filter(i=>expenseCats.find(c=>c.id===i.category_id)).sort((a,b)=>getBudget(b.id)-getBudget(a.id)).slice(0,10);
  const RADIAN=Math.PI/180;
  const renderLabel=({cx,cy,midAngle,innerRadius,outerRadius,percent})=>{
    if(percent<0.06)return null;
    const r=innerRadius+(outerRadius-innerRadius)*0.5,x=cx+r*Math.cos(-midAngle*RADIAN),y=cy+r*Math.sin(-midAngle*RADIAN);
    return React.createElement('text',{x,y,fill:'white',textAnchor:'middle',dominantBaseline:'central',fontSize:11,fontWeight:'bold'},`${(percent*100).toFixed(0)}%`);
  };
  const catBar=[...categories].sort((a,b)=>a.sort_order-b.sort_order).filter(c=>c.name!=='Income').map(cat=>({name:cat.name,budget:Math.round(items.filter(i=>i.category_id===cat.id).reduce((s,i)=>s+getBudget(i.id),0))}));
  return React.createElement('div',{className:'space-y-6 fade-in'},
    React.createElement('div',{className:'flex items-center justify-between'},
      React.createElement('div',null,
        React.createElement('h2',{className:'text-xl font-bold text-slate-800'},'Dashboard'),
        React.createElement('p',{className:'text-slate-400 text-sm mt-0.5'},latestMonth?`Budget figures for ${latestMonth.month_label}`:'Monthly budget at a glance')
      ),
      React.createElement('div',{className:'flex items-center gap-2 text-xs text-slate-400'},
        React.createElement('span',{className:'w-2 h-2 rounded-full bg-emerald-400 inline-block'}),'Live from Supabase'
      )
    ),
    React.createElement('div',{className:'grid grid-cols-2 lg:grid-cols-4 gap-4'},
      React.createElement(KpiCard,{label:'Monthly Income',value:gbp(totalIncome),sub:adhocTotal>0?`incl. ${gbp(adhocTotal)} additional`:'Salary 1 + Salary 2',icon:'💵',color:'green'}),
      React.createElement(KpiCard,{label:'Total Outgoings',value:gbp(totalExpenses),sub:'All categories',icon:'💳',color:'blue'}),
      React.createElement(KpiCard,{label:'Monthly Surplus',value:gbp(surplus),sub:surplus>=0?'In the green ✓':'Over budget ✗',icon:surplus>=0?'✅':'⚠️',color:surplus>=0?'green':'red'}),
      React.createElement(KpiCard,{label:'Savings Rate',value:pct(surplus,totalIncome),sub:`${gbp(surplus)} retained monthly`,icon:'📈',color:'purple'})
    ),
    React.createElement('div',{className:'grid grid-cols-1 lg:grid-cols-2 gap-6'},
      React.createElement(Card,null,
        React.createElement('h3',{className:'font-semibold text-slate-700 mb-4'},'Spending by Category'),
        React.createElement('div',{className:'flex flex-col sm:flex-row items-center gap-6'},
          React.createElement(ResponsiveContainer,{width:200,height:200},
            React.createElement(PieChart,null,
              React.createElement(Pie,{data:pieData,cx:'50%',cy:'50%',innerRadius:55,outerRadius:90,dataKey:'value',paddingAngle:3,labelLine:false,label:renderLabel},
                ...pieData.map((e,i)=>React.createElement(Cell,{key:i,fill:PIE_COLORS[i%PIE_COLORS.length]}))
              ),
              React.createElement(Tooltip,{formatter:v=>[gbp(v),'Budget']})
            )
          ),
          React.createElement('div',{className:'flex flex-col gap-2.5'},
            ...pieData.map((d,i)=>React.createElement('div',{key:i,className:'flex items-center gap-2.5'},
              React.createElement('div',{className:'w-3 h-3 rounded-full flex-shrink-0',style:{backgroundColor:PIE_COLORS[i%PIE_COLORS.length]}}),
              React.createElement('div',null,
                React.createElement('p',{className:'text-sm font-semibold text-slate-700'},d.name),
                React.createElement('p',{className:'text-xs text-slate-400'},`${gbp(d.value)} · ${totalExpenses>0?((d.value/totalExpenses)*100).toFixed(0):0}%`)
              )
            ))
          )
        )
      ),
      React.createElement(Card,null,
        React.createElement('h3',{className:'font-semibold text-slate-700 mb-4'},'Budget by Category'),
        React.createElement(ResponsiveContainer,{width:'100%',height:220},
          React.createElement(BarChart,{data:catBar,margin:{top:5,right:10,left:0,bottom:5}},
            React.createElement(CartesianGrid,{strokeDasharray:'3 3',stroke:'#f1f5f9'}),
            React.createElement(XAxis,{dataKey:'name',tick:{fontSize:11}}),
            React.createElement(YAxis,{tick:{fontSize:10},tickFormatter:v=>`£${(v/1000).toFixed(1)}k`}),
            React.createElement(Tooltip,{formatter:v=>[gbp(v),'Budget']}),
            React.createElement(Bar,{dataKey:'budget',radius:[6,6,0,0],name:'Budget'},
              ...catBar.map((e,i)=>React.createElement(Cell,{key:i,fill:CAT_COLORS[e.name]||'#94a3b8'}))
            )
          )
        )
      )
    ),
    React.createElement(Card,null,
      React.createElement('h3',{className:'font-semibold text-slate-700 mb-4'},'Top 10 Items by Budget'),
      React.createElement('div',{className:'space-y-2.5'},
        ...topItems.map(item=>{
          const cat=categories.find(c=>c.id===item.category_id);
          const bgt=getBudget(item.id);
          const maxBgt=getBudget(topItems[0].id);
          return React.createElement('div',{key:item.id,className:'flex items-center gap-3'},
            React.createElement('p',{className:'w-32 text-xs text-slate-600 truncate font-medium'},item.name),
            React.createElement('div',{className:'flex-1 bg-slate-100 rounded-full h-2'},
              React.createElement('div',{className:'h-2 rounded-full',style:{width:`${maxBgt?((bgt/maxBgt)*100):0}%`,backgroundColor:CAT_COLORS[cat?.name]||'#1B3A6B'}})
            ),
            React.createElement('p',{className:'w-20 text-right text-xs font-bold text-slate-600'},gbp2(bgt))
          );
        })
      )
    ),
    React.createElement(Card,null,
      React.createElement('h3',{className:'font-semibold text-slate-700 mb-3'},'Category Summary'),
      React.createElement('table',{className:'w-full text-sm'},
        React.createElement('thead',null,
          React.createElement('tr',{className:'text-xs text-slate-400 uppercase tracking-wide border-b border-slate-100'},
            React.createElement('th',{className:'text-left pb-2'},'Category'),
            React.createElement('th',{className:'text-right pb-2'},'Items'),
            React.createElement('th',{className:'text-right pb-2'},'Budget'),
            React.createElement('th',{className:'text-right pb-2'},'% of Outgoings')
          )
        ),
        React.createElement('tbody',{className:'divide-y divide-slate-50'},
          ...[...categories].sort((a,b)=>a.sort_order-b.sort_order).map(cat=>{
            const catItems=items.filter(i=>i.category_id===cat.id);
            const total=catItems.reduce((s,i)=>s+getBudget(i.id),0)+(cat.name==='Income'?adhocTotal:0);
            const isInc=cat.name==='Income';
            return React.createElement('tr',{key:cat.id,className:'hover:bg-slate-50'},
              React.createElement('td',{className:'py-2.5'},
                React.createElement('div',{className:'flex items-center gap-2'},
                  React.createElement('div',{className:'w-2.5 h-2.5 rounded-full',style:{backgroundColor:CAT_COLORS[cat.name]||'#94a3b8'}}),
                  React.createElement('span',{className:'font-medium'},cat.name)
                )
              ),
              React.createElement('td',{className:'text-right text-slate-400'},isInc&&adhocTotal>0?`${catItems.length}+`:catItems.length),
              React.createElement('td',{className:`text-right font-bold ${isInc?'text-emerald-600':'text-slate-700'}`},gbp(total)),
              React.createElement('td',{className:'text-right text-slate-400'},isInc?'—':`${totalExpenses>0?((total/totalExpenses)*100).toFixed(1):0}%`)
            );
          })
        ),
        React.createElement('tfoot',null,
          React.createElement('tr',{className:'border-t-2 border-slate-200'},
            React.createElement('td',{className:'pt-3 font-bold text-slate-800'},'Net Surplus'),
            React.createElement('td',{className:'pt-3 text-right text-slate-400'},items.length),
            React.createElement('td',{className:`pt-3 text-right font-bold text-lg ${surplus>=0?'text-emerald-600':'text-red-500'}`},gbp(surplus)),
            React.createElement('td',{className:`pt-3 text-right font-bold ${surplus>=0?'text-emerald-600':'text-red-500'}`},pct(surplus,totalIncome))
          )
        )
      )
    )
  );
}

// ── Budget ────────────────────────────────────────────────────────────────────
function Budget({d}){
  const{categories,items,months,actuals,monthBudgets,adhocList,selectedMonth,setSelectedMonth,refresh}=d;
  const[editActualKey,setEditActualKey]=useState(null);
  const[editBudgetKey,setEditBudgetKey]=useState(null);
  const[editVal,setEditVal]=useState('');
  const[expanded,setExpanded]=useState({});
  const[addingMonth,setAddingMonth]=useState(false);
  const[showAddAdhoc,setShowAddAdhoc]=useState(false);
  const[adhocDesc,setAdhocDesc]=useState('');
  const[adhocAmt,setAdhocAmt]=useState('');

  const toggle=id=>setExpanded(e=>({...e,[id]:e[id]===false?true:false}));

  const getBudget=itemId=>{
    if(selectedMonth){const mb=monthBudgets.find(b=>b.month_id===selectedMonth.id&&b.item_id===itemId);if(mb)return parseFloat(mb.budget_amount);}
    const it=items.find(i=>i.id===itemId);return it?parseFloat(it.budget_amount):0;
  };
  const getActual=itemId=>{
    if(!selectedMonth)return null;
    const a=actuals.find(a=>a.month_id===selectedMonth.id&&a.item_id===itemId);
    return a!=null?parseFloat(a.actual_amount):null;
  };

  const saveActual=async itemId=>{
    if(!selectedMonth)return;
    await sb.from('month_actuals').upsert({month_id:selectedMonth.id,item_id:itemId,actual_amount:parseFloat(editVal)||0},{onConflict:'month_id,item_id'});
    await refresh();setEditActualKey(null);
  };
  const saveBudget=async itemId=>{
    if(!selectedMonth)return;
    await sb.from('month_budgets').upsert({month_id:selectedMonth.id,item_id:itemId,budget_amount:parseFloat(editVal)||0},{onConflict:'month_id,item_id'});
    await refresh();setEditBudgetKey(null);
  };
  const saveAdhoc=async()=>{
    if(!selectedMonth||!adhocDesc.trim())return;
    await sb.from('month_adhoc_income').insert({month_id:selectedMonth.id,description:adhocDesc.trim(),amount:parseFloat(adhocAmt)||0});
    await refresh();setAdhocDesc('');setAdhocAmt('');setShowAddAdhoc(false);
  };
  const deleteAdhoc=async id=>{
    await sb.from('month_adhoc_income').delete().eq('id',id);
    await refresh();
  };

  const addMonth=async()=>{
    setAddingMonth(true);

function AISavingsPanel({d}){
  const{categories,items,actuals,monthBudgets,adhocList,goals,selectedMonth}=d;
  const[status,setStatus]=useState('idle');
  const[result,setResult]=useState(null);
  const[err,setErr]=useState('');
  const[dismissed,setDismissed]=useState(false);
  if(!selectedMonth||dismissed)return null;
  const buildPrompt=()=>{
    const mid=selectedMonth.id;
    const getIB=item=>{const ov=monthBudgets.find(mb=>mb.month_id===mid&&mb.item_id===item.id);return parseFloat(ov?ov.budget_amount:item.budget_amount)||0;};
    const getA=item=>{const a=actuals.find(ac=>ac.month_id===mid&&ac.item_id===item.id);return a?parseFloat(a.actual_amount)||0:null;};
    const ic=categories.find(c=>c.name==='Income');
    const ii=ic?items.filter(i=>i.category_id===ic.id):[];
    const ib=ii.reduce((s,i)=>s+getIB(i),0);
    const ia=ii.reduce((s,i)=>{const a=getA(i);return s+(a!==null?a:getIB(i));},0);
    const at=adhocList.filter(a=>a.month_id===mid).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
    const oc=categories.filter(c=>c.name!=='Income');
    const cl=oc.map(c=>{const ci=items.filter(i=>i.category_id===c.id);const bud=ci.reduce((s,i)=>s+getIB(i),0);const av=ci.map(i=>getA(i)).filter(v=>v!==null);const act=av.length>0?av.reduce((s,v)=>s+v,0):null;return c.name+' budget='+bud.toFixed(0)+(act!==null?' actual='+act.toFixed(0):'');}).join(', ');
    const ob=oc.reduce((s,c)=>s+items.filter(i=>i.category_id===c.id).reduce((ss,i)=>ss+getIB(i),0),0);
    const oa=oc.reduce((s,c)=>s+items.filter(i=>i.category_id===c.id).reduce((ss,i)=>{const a=getA(i);return ss+(a!==null?a:getIB(i));},0),0);
    const gfi=items.find(i=>i.name==='Goals Funding');
    const gfa=gfi?getIB(gfi):0;
    const GL={1:'MUST',2:'SHOULD',3:'COULD',4:'NICE'};
    const gl=goals.filter(g=>g.is_active!==false).sort((a,b)=>(a.priority||2)-(b.priority||2)).map(g=>{const p=g.target_amount>0?Math.round((parseFloat(g.current_amount)/parseFloat(g.target_amount))*100):0;const mo=g.target_date?Math.max(0,Math.round((new Date(g.target_date)-new Date())/2592000000)):-1;return (g.emoji||'')+' '+g.name+' ['+GL[g.priority||2]+'] saved='+parseFloat(g.current_amount).toFixed(0)+' target='+parseFloat(g.target_amount).toFixed(0)+' pct='+p+(mo>=0?' months='+mo:'');}).join(', ');
    return 'Month='+selectedMonth.month_label+' IncomeBudget='+ib.toFixed(0)+' IncomeActual='+ia.toFixed(0)+(at>0?' AdhocIncome='+at.toFixed(0):'')+' Categories: '+cl+' OutgoingsBudget='+ob.toFixed(0)+' OutgoingsActual='+oa.toFixed(0)+' SurplusBudget='+(ib+at-ob).toFixed(0)+' SurplusActual='+(ia+at-oa).toFixed(0)+' GoalsFunding='+gfa.toFixed(0)+' Goals: '+gl+' Task: Split the '+gfa.toFixed(0)+' Goals Funding across the goals. Return ONLY valid JSON with no markdown: {"headline":"one sentence","suggestions":[{"goal":"name","amount":0,"reason":"one sentence"}],"total":0,"rationale":"2-3 sentences"}';
  };
  const generate=async()=>{
    setStatus('loading');setErr('');
    try{
